<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity CAD v3 | Pro Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3.0.1">
</head>
<body>

    <header>
        <div class="logo">
            <div class="logo-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
            </div>
            <span class="logo-text">ANTIGRAVITY <span style="font-family: 'Orbitron'; font-weight: 800; font-size: 1rem; color: var(--accent);">V3</span></span>
        </div>
        
        <div id="kernel-status" style="display: flex; align-items: center; gap: 8px; font-size: 0.75rem; color: var(--text-dim); background: rgba(0,0,0,0.2); padding: 6px 12px; border-radius: 20px;">
            <div id="kernel-spinner" class="loader" style="width: 12px; height: 12px; border-width: 2px;"></div>
            <span id="kernel-text">Kernel: Loading...</span>
        </div>
        <div class="header-actions">
            <button class="tool-btn" id="btn-undo" title="Undo (Ctrl+Z)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 14L4 9l5-5"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg></button>
            <button class="tool-btn" id="btn-redo" title="Redo (Ctrl+Y)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 14l5-5-5-5"/><path d="M4 20v-7a4 4 0 0 1 4-4h12"/></svg></button>
            <div style="width: 1px; height: 24px; background: var(--border); margin: 0 10px; display: inline-block;"></div>
            <button class="tool-btn" id="btn-export" title="Export STL"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
        </div>
    </header>

    <div id="app-container">
        <aside id="sidebar">
            <div class="panel-header">
                <span class="panel-title">Feature Tree</span>
                <button id="btn-add-feature" style="background: none; border: none; color: var(--accent); cursor: pointer;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
            </div>
            <div id="feature-tree">
                <!-- Features populate here -->
                <div id="empty-tree" style="padding: 40px 20px; text-align: center; color: var(--text-dim);">
                    <p style="font-size: 0.8rem;">No features yet.<br>Create a sketch to begin.</p>
                </div>
            </div>
            <div id="properties-panel" style="border-top: 1px solid var(--border); padding: 20px; background: rgba(0,0,0,0.15);">
                <span class="panel-title" style="display: block; margin-bottom: 15px;">Properties</span>
                <div id="properties-content">
                    <p style="color: var(--text-dim); font-size: 0.8rem;">Select a feature to edit.</p>
                </div>
            </div>
        </aside>

        <main id="viewport-container">
            <canvas id="canvas"></canvas>
            
            <div id="toolbar">
                <button class="tool-btn" data-tool="select" title="Selection Mode"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="M13 13l6 6"/></svg></button>
                <div style="width: 1px; height: 24px; background: var(--border); margin: auto 4px;"></div>
                <button class="tool-btn" id="btn-new-sketch" title="New Sketch (K)"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button>
                <button class="tool-btn" id="btn-pad" title="Pad / Extrude" style="display: none;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 11 12 6 7 11"/><line x1="12" y1="18" x2="12" y2="6"/></svg></button>
                <div style="width: 1px; height: 24px; background: var(--border); margin: auto 4px;"></div>
                <button class="tool-btn" data-shape="box" title="Box Primitive"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></button>
                <button class="tool-btn" data-shape="cylinder" title="Cylinder Primitive"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 5v14c0 1.66-4.03 3-9 3s-9-1.34-9-3V5"/></svg></button>
            </div>

            <div id="status-bar">
                <span id="status-msg">System Ready</span>
                <span id="coord-display">X: 0.0  Y: 0.0  Z: 0.0</span>
            </div>
        </main>
    </div>

    <div id="context-menu">
        <div class="cm-item" id="cm-edit">Edit Feature</div>
        <div class="cm-item" id="cm-delete" style="color: var(--danger);">Delete</div>
    </div>

    <!-- Scripts -->
    <script src="lib/opencascade.js"></script>
    <script type="module" src="src/app.js?v=3.0.1"></script>
</body>
</html>
